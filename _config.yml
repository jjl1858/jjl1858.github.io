# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: 庹忠曜 | 具身智能探索者
email: zhongyao.tuo@shanghaitech.edu.cn
description: >- # this means to ignore newlines until "baseurl:"
  南京邮电大学优秀毕业生，以专业第一名保研至上海科技大学信息学院，
  专注具身智能、嵌入式系统与机器人自主导航的交叉研究。
  累计发表学术论文7篇（一作2篇），获第九届中国"互联网+"大学生创新创业大赛全国金奖等国家级奖项3项。
twitter_username: username
github_username: ZhongyaoTuo
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Asia/Shanghai # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "庹忠曜 (Tuo Zhongyao)"
  avatar : "/assets/images/avatar.jpg"     # 请将头像图片放在 /assets/images/ 目录下
  bio    : "上海科技大学信息学院硕士生，专注具身智能与嵌入式系统研究。累计发表论文7篇，获国家级奖项3项。"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ZhongyaoTuo"
    - label: "OpenReview"
      icon: "fas fa-fw fa-user-graduate"
      url: "https://openreview.net/profile?id=~Zhongyao_Tuo1"
    - label: "百度百科"
      icon: "fas fa-fw fa-globe"
      url: "https://baike.baidu.com/item/%E5%BA%B9%E5%BF%A0%E6%9B%9C/65136312"
    # 如果有论文、专利或项目的 PDF 文件，可以将它们放在 /assets/pdf/ 目录下，并通过下方链接展示
    # - label: "Google Scholar"
    #   icon: "fas fa-fw fa-graduation-cap"
    #   url: "https://scholar.google.com/..."

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ZhongyaoTuo"
    - label: "OpenReview"
      icon: "fas fa-fw fa-user-graduate"
      url: "https://openreview.net/profile?id=~Zhongyao_Tuo1"
    - label: "百度百科"
      icon: "fas fa-fw fa-globe"
      url: "https://baike.baidu.com/item/%E5%BA%B9%E5%BF%A0%E6%9B%9C/65136312"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
