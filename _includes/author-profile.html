<div class="author__avatar" style="text-align: center;">
  {% if site.author.avatar %}
    <img src="{{ site.author.avatar | relative_url }}" alt="Avatar" 
         style="display: inline-block; border-radius: 30% / 50%; width: 120px; height: auto; max-width: 100%; object-fit: cover;">
  {% endif %}
</div>

<div class="author__content">
  <h3 class="author__name" style="text-align: center; line-height: 1.3; margin-bottom: 0.5rem;">
    庹忠曜<br>Zhongyao Tuo
  </h3>
  {% if site.author.bio %}
    <div class="author__bio" style="text-align: center; margin: 0.75rem 0; line-height: 1.5;">
      {{ site.author.bio | markdownify }}
    </div>
  {% endif %}
</div>

<div class="author__urls-wrapper" style="text-align: center;">
  <ul class="author__urls social-icons" style="padding-left: 0; list-style: none; margin-top: 1rem;">
    {% if site.author.location %}
      <li style="margin-bottom: 0.75rem;">
        <i class="fas fa-fw fa-map-marker-alt"></i> {{ site.author.location }}
      </li>
    {% endif %}
    {% for link in site.author.links %}
      <li style="margin-bottom: 0.75rem;">
        <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer"
           style="display: inline-flex !important; align-items: center !important; gap: 0.5rem !important; flex-direction: row !important; white-space: nowrap !important;">
          <i class="{{ link.icon | default: 'fas fa-link' }}"></i>
          {{ link.label }}
        </a>
      </li>
    {% endfor %}
  </ul>
</div>
